    testcontainers:
        tags:
            - tooling
            - testing
            - containers
            - integration-testing
            - bit
        content: |-
            # Testcontainers

            Lib for throwaway containers in tests—real deps (DBs, brokers) vs mocks.

            ## Test Types (by what, not how)

            | Type | Tests | Location |
            |------|-------|----------|
            | Unit | Pure logic | Adjacent `.test` |
            | BIT | Single impl vs interface | Adjacent `.test` (w/ testcontainers) |
            | Integration | Multi-component | `tests/` |
            | E2E | Full system | Separate project |

            **BITs w/ testcontainers = unit-adjacent.** Test one thing, fast, colocated.

            ## Mock vs Real

            **Testcontainers:** DBs, brokers, controlled infra
            **Mocks:** External APIs, failure injection

            If cheap to test real, do it.

            ## Core

            - Real services as Docker/Podman containers
            - Auto cleanup, randomized ports, cross-platform

            ## Go Quick Start

            ```go
            container, err := testcontainers.GenericContainer(ctx, testcontainers.GenericContainerRequest{
                ContainerRequest: testcontainers.ContainerRequest{
                    Image:        "postgres:16-alpine",
                    ExposedPorts: []string{"5432/tcp"},
                    Env:          map[string]string{"POSTGRES_PASSWORD": "test", "POSTGRES_DB": "testdb"},
                    WaitingFor:   wait.ForLog("database system is ready").WithOccurrence(2),
                },
                Started: true,
            })
            defer container.Terminate(ctx)
            host, _ := container.Host(ctx)
            port, _ := container.MappedPort(ctx, "5432")
            ```

            ## Wait Strategies

            ```go
            wait.ForLog("Ready")
            wait.ForHTTP("/health").WithPort("8080/tcp")
            wait.ForListeningPort("5432/tcp")
            wait.ForSQL("5432/tcp", "postgres", connStrFunc)
            wait.ForAll(wait.ForLog("Started"), wait.ForHTTP("/ready"))
            ```

            ## Lifecycle

            `Start(ctx)`, `Stop(ctx, nil)`, `Terminate(ctx)`

            ## Modules (Pre-configured)

            ```go
            container, _ := postgres.Run(ctx, "postgres:16-alpine",
                postgres.WithDatabase("testdb"), postgres.WithUsername("user"), postgres.WithPassword("pass"))
            connStr, _ := container.ConnectionString(ctx, "sslmode=disable")
            ```

            Modules: PostgreSQL, MySQL, Redis, MongoDB, Kafka, RabbitMQ, Elasticsearch, LocalStack, etc.

            ## Networks

            ```go
            req := testcontainers.ContainerRequest{
                Networks:       []string{"test-network"},
                NetworkAliases: map[string][]string{"test-network": {"myservice"}},
            }
            ```

            ## Files/Config

            ```go
            container.CopyFileToContainer(ctx, "local.conf", "/etc/app/config.conf", 0644)
            // Mounts: testcontainers.BindMount("/host", "/container")
            // Files: ContainerFile{HostFilePath: "init.sql", ContainerFilePath: "/docker-entrypoint-initdb.d/init.sql"}
            ```

            ## Exec/Logs

            ```go
            exitCode, reader, _ := container.Exec(ctx, []string{"psql", "-U", "postgres", "-c", "SELECT 1"})
            logs, _ := container.Logs(ctx)
            ```

            ## Reusable Containers

            ```go
            req := testcontainers.ContainerRequest{Name: "reusable-postgres"}
            req = req.WithReuse(ctx)
            ```

            ## Test Categorization

            ```go
            //go:build testcontainers
            func TestPostgresStorage(t *testing.T) { /* ... */ }
            ```

            ```rust
            #[cfg_attr(not(feature = "testcontainers"), ignore)]
            fn test_postgres_storage() { /* ... */ }
            ```

            ## Best Practices

            1. Use modules when available
            2. Always `defer Terminate()`
            3. Proper wait strategies
            4. Never hardcode ports—use `MappedPort()`
            5. Tag images explicitly, prefer alpine
            6. Parallel tests OK—each gets own container
            7. Colocate BITs next to impl

            ## Troubleshooting

            - Slow: lighter images, check wait strategy
            - Port conflicts: use `MappedPort()`
            - Not ready: add wait strategy
            - Cleanup: always `defer Terminate()`
            - CI: verify Docker access, resource limits
