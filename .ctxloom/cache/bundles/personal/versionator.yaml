version: 1.0.0
tags:
    - versioning
    - semver
    - release
author: scm
description: Semantic versioning and release cycle management
notes: |
    Release workflow and versioning prompts for use with versionator tool.
prompts:
    release:
        description: Release workflow for versionator projects
        tags:
            - versioning
            - release
            - workflow
        content: |-
            Release workflow for versionator. User MUST specify version.

            User input: $ARGUMENTS
            - Fixed version: "0.1.0", "1.0.0", "2.3.4"
            - Bump instruction: "patch", "minor", "major"

            If no version specified, STOP and ask the user. Do not guess.

            Steps:
            1. Parse user input for version or bump instruction
            2. Stage all changes: `git add -A`
            3. Analyze changes and create appropriate conventional commit message
            4. If bump instruction (patch/minor/major):
               - Commit with appropriate conventional prefix (fix:/feat:/feat!:)
               - Run `./versionator bump` to increment and amend
            5. If fixed version (X.Y.Z):
               - Write version to VERSION file
               - Commit with version in message
            6. Run `./versionator release push` to create tag, release branch, and push

            IMPORTANT: Never auto-select version. User must explicitly specify.
        content_hash: sha256:3d93b025e504ba73972d1ea7681a2ba51e777729acb22e365814ba49edbb45f3
        distilled: |-
            # release

            Release workflow for versionator. User MUST specify version.

            Input: $ARGUMENTS
            - Fixed: "0.1.0", "1.0.0"
            - Bump: "patch", "minor", "major"

            No version → STOP and ask. Never guess.

            Steps:
            1. Parse input
            2. `git add -A`
            3. Create conventional commit
            4. Bump instruction: commit w/ fix:/feat:/feat!:, run `./versionator bump`, amend
            5. Fixed version: write VERSION, commit
            6. `./versionator release push` → tag, release branch, push
        distilled_by: claude-3-opus
    suggest-version:
        description: Display current version and suggest next version based on changes
        tags:
            - versioning
            - semver
            - analysis
        content: |-
            Analyze the repository and suggest the next semantic version.

            Steps:
            1. Read the current version from VERSION file
            2. Get changes since last tag using `git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD`
            3. Analyze the commit messages and code changes

            Display format:
            ```
            Current version: X.Y.Z
            Commits since last release: N

            Changes:
            - [list key changes]

            Suggested next version: X.Y.Z
            Reasoning: [explanation based on semver]
            ```

            Semver rules:
            - MAJOR (X): Breaking API changes, incompatible modifications
            - MINOR (Y): New backward-compatible features, significant enhancements
            - PATCH (Z): Bug fixes, minor improvements, documentation

            Pre-1.0 rules:
            - Breaking changes can be MINOR (0.X.0)
            - Features can be PATCH (0.0.X)

            Be conservative: when uncertain, suggest the lower bump level.
        content_hash: sha256:022d75da530d8dc9c31f03dc5a642f3b57d9a4275a7afa8766046eb182b1589c
        distilled: |-
