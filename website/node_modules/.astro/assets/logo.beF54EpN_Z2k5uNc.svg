<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Main circle -->
  <circle cx="50" cy="50" r="45" fill="url(#purpleGradient)"/>
  <!-- Version number symbol - stylized "V" with version dots -->
  <path d="M30 30 L50 70 L70 30" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Version dots (semver representation) -->
  <circle cx="35" cy="80" r="5" fill="white"/>
  <circle cx="50" cy="80" r="5" fill="white"/>
  <circle cx="65" cy="80" r="5" fill="white"/>
</svg>
