prompt = "# release\n\nRelease workflow for versionator. User MUST specify version.\n\nInput: $ARGUMENTS\n- Fixed: \"0.1.0\", \"1.0.0\"\n- Bump: \"patch\", \"minor\", \"major\"\n\nNo version? STOP and ask. Never guess.\n\nSteps:\n1. Parse input for version/bump\n2. `git add -A`\n3. Analyze changes, create conventional commit\n4. Bump instruction:\n   - Commit w/ prefix (fix:/feat:/feat!:)\n   - `./versionator bump` to increment+amend\n5. Fixed version:\n   - Write to VERSION\n   - Commit w/ version\n6. `./versionator release push` → tag, branch, push\n\nCRITICAL: Never auto-select version."
