name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract tag version
      id: tag_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Processing release for tag: $TAG (version: $VERSION)"

    - name: Build and package release
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/${{ github.repository }}/release-build
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        runCmd: |
          # Initialize project
          just init

          # Build for all platforms (static binaries with CGO_ENABLED=0)
          just build-all

          # Create release directory
          mkdir -p release

          # Create tar.gz archives for Unix platforms (preserves +x bit)
          for binary in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 freebsd-amd64; do
            chmod +x bin/versionator-${binary}
            tar -czvf release/versionator-${binary}.tar.gz -C bin versionator-${binary}
          done

          # Create zip archives for Windows
          for binary in windows-amd64 windows-arm64; do
            (cd bin && zip ../release/versionator-${binary}.zip versionator-${binary}.exe)
          done

          # Create checksums
          cd release
          sha256sum * > checksums.txt
          ls -la

    - name: Submit to VirusTotal
      id: virustotal
      run: |
        if [ -z "$VIRUSTOTAL_API_KEY" ]; then
          echo "VIRUSTOTAL_API_KEY not set, skipping VirusTotal submission"
          echo "VT_RESULTS=_VirusTotal scanning not configured for this release._" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Submitting binaries to VirusTotal..."

        # Create markdown table for results
        echo "| Archive | VirusTotal Analysis |" > vt_results.md
        echo "|---------|---------------------|" >> vt_results.md

        for archive in release/*.tar.gz release/*.zip; do
          filename=$(basename "$archive")
          echo "Uploading $filename..."

          # Upload to VirusTotal and get analysis ID
          response=$(curl -s --request POST \
            --url 'https://www.virustotal.com/api/v3/files' \
            --header "x-apikey: $VIRUSTOTAL_API_KEY" \
            --form "file=@$archive")

          # Extract analysis ID
          analysis_id=$(echo "$response" | jq -r '.data.id // empty')

          if [ -n "$analysis_id" ]; then
            # VirusTotal GUI URL for the analysis
            vt_url="https://www.virustotal.com/gui/file-analysis/${analysis_id}"
            echo "| \`$filename\` | [View Analysis]($vt_url) |" >> vt_results.md
            echo "  -> $vt_url"
          else
            echo "| \`$filename\` | Upload failed |" >> vt_results.md
            echo "  -> Upload failed: $response"
          fi

          # Rate limit: VirusTotal free tier is 4 requests/minute
          sleep 16
        done

        # Output results for use in release notes (multiline)
        {
          echo "VT_RESULTS<<EOF"
          cat vt_results.md
          echo "EOF"
        } >> $GITHUB_OUTPUT
      env:
        VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag_version.outputs.tag }}
        name: Versionator ${{ steps.tag_version.outputs.version }}
        body: |
          ## Versionator ${{ steps.tag_version.outputs.version }}

          ### Installation

          #### Linux/macOS/FreeBSD
          ```bash
          curl -LO https://github.com/benjaminabbitt/versionator/releases/download/${{ steps.tag_version.outputs.tag }}/versionator-linux-amd64.tar.gz
          tar xzf versionator-linux-amd64.tar.gz
          sudo mv versionator-linux-amd64 /usr/local/bin/versionator
          ```

          #### Windows
          ```powershell
          Invoke-WebRequest -Uri https://github.com/benjaminabbitt/versionator/releases/download/${{ steps.tag_version.outputs.tag }}/versionator-windows-amd64.zip -OutFile versionator.zip
          Expand-Archive versionator.zip -DestinationPath .
          Move-Item versionator-windows-amd64.exe versionator.exe
          ```

          ### Available Archives

          | Platform | Architecture | Archive |
          |----------|--------------|---------|
          | Linux | x64 | `versionator-linux-amd64.tar.gz` |
          | Linux | arm64 | `versionator-linux-arm64.tar.gz` |
          | macOS | Intel | `versionator-darwin-amd64.tar.gz` |
          | macOS | Apple Silicon | `versionator-darwin-arm64.tar.gz` |
          | Windows | x64 | `versionator-windows-amd64.zip` |
          | Windows | arm64 | `versionator-windows-arm64.zip` |
          | FreeBSD | x64 | `versionator-freebsd-amd64.tar.gz` |

          ### Verification

          All archives are provided with SHA256 checksums in `checksums.txt`.
          ```bash
          sha256sum -c checksums.txt --ignore-missing
          ```

          ### Security Scanning

          > ⚠️ **Disclaimer**: These VirusTotal scans are provided for transparency. A clean scan does not guarantee the software is safe, and false positives can occur. You should always review source code and build from source if you have concerns. We provide these links so you can make your own informed decision.

          ${{ steps.virustotal.outputs.VT_RESULTS }}

        files: |
          release/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
