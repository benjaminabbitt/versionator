name: Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    # Skip if commit message contains [skip ci] (prevents infinite loop on version bump)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and run dev container action
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/${{ github.repository }}/devcontainer
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        push: filter
        refFilterForPush: refs/heads/master
        runCmd: |
          # Run initialization
          just init

          # Build application FIRST (needed for acceptance tests)
          just build

          # Run tests (including acceptance tests that need the binary)
          export VERSIONATOR_PROJECT_ROOT=$(pwd)/bin
          just test-coverage

          # Run linting
          just lint

          # Build for multiple platforms
          just build-all

          # Test basic functionality
          just version || echo "No VERSION file - expected for new repo"

          # Show build artifacts
          ls -la bin/

    - name: Upload coverage reports
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html
        retention-days: 30

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: versionator-binaries
        path: bin/
        retention-days: 30

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: versionator-binaries
        path: bin/

    - name: Make binary executable
      run: chmod +x bin/versionator-linux-amd64

    - name: Integration test
      run: |
        # Initialize VERSION file
        echo "1.0.0" > VERSION

        # Test version reading
        VERSION=$(./bin/versionator-linux-amd64 version)
        echo "Current version: $VERSION"

        # Test version incrementing
        ./bin/versionator-linux-amd64 patch increment
        NEW_VERSION=$(./bin/versionator-linux-amd64 version)
        echo "New version: $NEW_VERSION"

        # Verify version changed
        if [ "$VERSION" = "$NEW_VERSION" ]; then
          echo "ERROR: Version did not increment"
          exit 1
        fi

        echo "Integration test passed!"

  mutation-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install go-mutesting
      run: go install github.com/zimmski/go-mutesting/cmd/go-mutesting@latest

    - name: Run mutation tests
      run: |
        # Run mutation tests on core packages
        go-mutesting ./internal/version/... ./internal/versionator/... 2>&1 | tee mutation-report.txt

        # Extract mutation score (format: "The mutation score is 0.XXXX")
        SCORE=$(grep -oP 'mutation score is \K[0-9.]+' mutation-report.txt || echo "0")
        THRESHOLD=0.45  # Current score is ~48%, improve over time

        echo "Mutation score: $SCORE (threshold: $THRESHOLD)"

        # Compare using bc for float comparison
        if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then
          echo "::error::Mutation score $SCORE is below threshold $THRESHOLD"
          exit 1
        fi

        echo "::notice::Mutation score $SCORE meets threshold $THRESHOLD"

    - name: Upload mutation report
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: mutation-report.txt
        retention-days: 30

  bump-and-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: mutation-test
    permissions:
      contents: write
      actions: write  # Required to trigger release workflow

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: versionator-binaries
        path: bin/

    - name: Bump version and release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        chmod +x bin/versionator-linux-amd64

        # Get current version
        CURRENT=$(cat VERSION)

        # Bump patch version using versionator itself (dogfooding)
        ./bin/versionator-linux-amd64 patch increment

        # Get new version
        NEW=$(cat VERSION)

        echo "Version bumped: $CURRENT -> $NEW"

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Commit version bump
        git add VERSION
        git commit -m "chore: bump version to $NEW [skip ci]"

        # Create release branch (VERSION already has 'v' prefix)
        git checkout -b "release/$NEW"

        # Push release branch
        git push origin "release/$NEW"

        # Switch back to master and push
        git checkout master
        git push origin master

        # Create tag using versionator (use --prefix="" since VERSION already has 'v' prefix)
        if git rev-parse "$NEW" >/dev/null 2>&1; then
          echo "::warning::Tag $NEW already exists, skipping release"
        else
          ./bin/versionator-linux-amd64 tag --prefix="" --message "Release $NEW"
          git push origin "$NEW"

          # Trigger release workflow via workflow_dispatch
          # (tag push doesn't trigger workflows when using GITHUB_TOKEN)
          gh workflow run release.yml -f tag="$NEW"
          echo "::notice::Released $NEW - triggered release.yml workflow"
        fi
