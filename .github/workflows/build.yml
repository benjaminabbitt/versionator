name: Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    # Skip if commit message contains [skip ci] (prevents infinite loop on version bump)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and run dev container action
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/${{ github.repository }}/devcontainer
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        push: filter
        refFilterForPush: refs/heads/master
        runCmd: |
          # Run initialization
          just init

          # Build application FIRST (needed for acceptance tests)
          just build

          # Run tests (including acceptance tests that need the binary)
          export VERSIONATOR_PROJECT_ROOT=$(pwd)/bin
          just test-coverage

          # Run linting
          just lint

          # Build for multiple platforms
          just build-all

          # Test basic functionality
          just version || echo "No VERSION file - expected for new repo"

          # Show build artifacts
          ls -la bin/

    - name: Upload coverage reports
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html
        retention-days: 30

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: versionator-binaries
        path: bin/
        retention-days: 30

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: versionator-binaries
        path: bin/

    - name: Make binary executable
      run: chmod +x bin/versionator-linux-amd64

    - name: Integration test
      run: |
        # Initialize VERSION file
        echo "1.0.0" > VERSION

        # Test version reading
        VERSION=$(./bin/versionator-linux-amd64 output version)
        echo "Current version: $VERSION"

        # Test version incrementing
        ./bin/versionator-linux-amd64 bump patch increment
        NEW_VERSION=$(./bin/versionator-linux-amd64 output version)
        echo "New version: $NEW_VERSION"

        # Verify version changed
        if [ "$VERSION" = "$NEW_VERSION" ]; then
          echo "ERROR: Version did not increment"
          exit 1
        fi

        echo "Integration test passed!"

  mutation-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Install gremlins
      run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

    - name: Run mutation tests
      run: |
        # Run mutation tests on core packages
        echo "=== Mutation testing internal/version ===" | tee mutation-report.txt
        gremlins unleash ./internal/version/ 2>&1 | tee -a mutation-report.txt

        echo "" | tee -a mutation-report.txt
        echo "=== Mutation testing internal/versionator ===" | tee -a mutation-report.txt
        gremlins unleash ./internal/versionator/ 2>&1 | tee -a mutation-report.txt

        # Extract test efficacy (format: "Test efficacy: XX.XX%")
        # We check that all covered mutants are killed (100% efficacy)
        EFFICACY=$(grep -oP 'Test efficacy: \K[0-9.]+' mutation-report.txt | tail -1 || echo "0")

        # Extract mutator coverage (format: "Mutator coverage: XX.XX%")
        COVERAGE=$(grep -oP 'Mutator coverage: \K[0-9.]+' mutation-report.txt | tail -1 || echo "0")

        COVERAGE_THRESHOLD=80.0

        echo "Test efficacy: ${EFFICACY}% (must be 100%)"
        echo "Mutator coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"

        # Efficacy must be 100% - all covered mutants must be killed
        if (( $(echo "$EFFICACY < 100.0" | bc -l) )); then
          echo "::error::Test efficacy ${EFFICACY}% is below 100% - some mutants survived!"
          exit 1
        fi

        # Coverage threshold check
        if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
          echo "::error::Mutator coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
          exit 1
        fi

        echo "::notice::Mutation testing passed - efficacy: ${EFFICACY}%, coverage: ${COVERAGE}%"

    - name: Upload mutation report
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: mutation-report.txt
        retention-days: 30
